spring:
  profiles:
    active: local

---
# Perfil para desenvolvimento local
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=FoodMenuDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: FoodMenu123!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.microsoft.sqlserver: DEBUG
    br.com.inovationtech: DEBUG

