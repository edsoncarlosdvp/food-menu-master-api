spring:
  application:
    name: FoodMenuMasterApi
  profiles:
    active: ${ACTIVE_PROFILE:local}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A713474}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    admin:
      username: ${ADMIN_USERNAME:admin}
      # BCrypt de "admin123" - troque por sua própria senha/hash
      password-hash: ${ADMIN_PASSWORD_HASH:$2a$10$9pO7l9Rz1YV4gk5x1efIfeQx3vFq2yQ2gk8Dxq7T2p3G6mYd2hZoi}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
---
# Perfil para desenvolvimento local (SQL Server via docker-compose)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=FoodMenuDB;encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:FoodMenu123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        '[format_sql]': true
        jdbc:
          '[time_zone]': UTC
          '[batch_size]': 20
        '[order_inserts]': true
        '[order_updates]': true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always

server:
  port: 3100

logging:
  level:
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.type.descriptor.sql.BasicBinder]': TRACE
    '[com.microsoft.sqlserver]': DEBUG
    '[br.com.inovationtech]': DEBUG

---
# Perfil para Docker (aplicação também containerizada)
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:sqlserver://sqlserver:1433;databaseName=FoodMenuDB;encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:FoodMenu123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        '[format_sql]': true
    defer-datasource-initialization: true

server:
  port: 8080

logging:
  level:
    '[org.hibernate.SQL]': DEBUG
    '[com.microsoft.sqlserver]': DEBUG
    '[br.com.inovationtech]': DEBUG